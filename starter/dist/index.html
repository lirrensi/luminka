<!-- FILE: starter/dist/index.html
PURPOSE: Host the starter scaffold UI and load the embedded SDK plus app shell.
OWNS: Starter browser document and module loading.
DOCS: docs/spec.md, docs/arch.md, agent_chat/plan_luminka_phase3_surface_examples_2026-03-30.md
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luminka Starter</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./luminka.js"></script>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="shell">
      <h1>Luminka Starter</h1>
      <p class="lede">A plain browser scaffold that exercises the SDK and local filesystem.</p>

      <section class="grid">
        <article class="panel">
          <h2>Connection</h2>
          <div class="row">
            <button id="connect-btn">Connect</button>
            <button id="info-btn">Refresh app info</button>
          </div>
          <pre id="status">Idle.</pre>
          <pre id="app-info">No app info loaded.</pre>
        </article>

        <article class="panel">
          <h2>Starter note</h2>
          <label for="note-input">Edit note text</label>
          <textarea id="note-input" rows="8">Hello from Luminka starter.</textarea>
          <div class="row">
            <button id="write-btn">Write note</button>
            <button id="read-btn">Read note</button>
            <button id="watch-btn">Watch note</button>
            <button id="unwatch-btn">Stop watch</button>
          </div>
          <pre id="note-output">Nothing read yet.</pre>
        </article>

        <article class="panel">
          <h2>Workspace</h2>
          <div class="row">
            <button id="list-btn">List root</button>
          </div>
          <pre id="file-list">No listing yet.</pre>
        </article>

        <article class="panel">
          <h2>File change notifications</h2>
          <ul id="events" class="events"></ul>
        </article>
      </section>
    </main>
  </body>
</html>
