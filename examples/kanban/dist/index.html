<!-- FILE: examples/kanban/dist/index.html
PURPOSE: Host the Luminka kanban example UI and load the embedded SDK plus app shell.
OWNS: Kanban example browser document and module loading.
DOCS: docs/spec.md, docs/arch.md, agent_chat/plan_luminka_phase3_surface_examples_2026-03-30.md
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luminka Kanban</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./luminka.js"></script>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <h1>Luminka Kanban</h1>
          <p class="lede">A filesystem-backed board that saves to <code>kanban.json</code>.</p>
        </div>
        <div class="actions">
          <button id="connect-btn">Connect</button>
          <button id="reload-btn">Reload board</button>
        </div>
      </header>

      <section class="status-grid">
        <article class="panel">
          <h2>Status</h2>
          <pre id="status">Disconnected.</pre>
        </article>
        <article class="panel">
          <h2>Board file</h2>
          <pre id="file-state">kanban.json not loaded.</pre>
        </article>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Board</h2>
          <p id="save-state" class="badge">Unsaved</p>
        </div>
        <div id="board" class="board"></div>
      </section>

      <section class="panel">
        <h2>Change log</h2>
        <ul id="events" class="events"></ul>
      </section>
    </main>
  </body>
</html>
