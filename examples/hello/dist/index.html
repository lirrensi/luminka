<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luminka Hello</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./luminka.js"></script>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="shell">
      <h1>Hello, Luminka</h1>
      <p class="lede">A tiny browser example that connects and shows runtime metadata.</p>

      <section class="panel">
        <div class="row">
          <button id="connect-btn">Connect</button>
          <button id="refresh-btn">Refresh app info</button>
        </div>
        <pre id="status">Disconnected.</pre>
        <pre id="info">No app info loaded.</pre>
        <p id="fs-state" class="badge">Filesystem capability: unknown</p>
      </section>
    </main>
  </body>
</html>
